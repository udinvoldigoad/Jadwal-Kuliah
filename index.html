<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/src/assets/ITERA.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadwal - Aplikasi Jadwal Kuliah</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">
  <!-- Material Symbols -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
    rel="stylesheet">
  <script>
    (function () {
      var root = document.documentElement;
      root.classList.add('material-icons-pending');

      function markReady() {
        root.classList.remove('material-icons-pending', 'material-icons-failed');
        root.classList.add('material-icons-ready');
      }

      function markFailed() {
        root.classList.remove('material-icons-pending');
        root.classList.add('material-icons-failed');
      }

      if (!document.fonts || !document.fonts.load) {
        markReady();
        return;
      }

      document.fonts
        .load('24px "Material Symbols Outlined"')
        .then(function (fonts) {
          if (fonts && fonts.length > 0) {
            markReady();
          } else {
            markFailed();
          }
        })
        .catch(markFailed);

      setTimeout(function () {
        if (!root.classList.contains('material-icons-ready')) {
          markFailed();
        }
      }, 5000);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
